<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Ground line -->
  <line x1="10" y1="130" x2="190" y2="130" stroke="#888" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Rear wheel -->
  <circle cx="55" cy="110" r="28" stroke="#555" stroke-width="3" stroke-opacity="0.75"/>
  <circle cx="55" cy="110" r="4" fill="#555" fill-opacity="0.75"/>
  <line x1="55" y1="82" x2="55" y2="138" stroke="#555" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="27" y1="110" x2="83" y2="110" stroke="#555" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="35" y1="90" x2="75" y2="130" stroke="#555" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="75" y1="90" x2="35" y2="130" stroke="#555" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Front wheel -->
  <circle cx="145" cy="110" r="28" stroke="#555" stroke-width="3" stroke-opacity="0.75"/>
  <circle cx="145" cy="110" r="4" fill="#555" fill-opacity="0.75"/>
  <line x1="145" y1="82" x2="145" y2="138" stroke="#555" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="117" y1="110" x2="173" y2="110" stroke="#555" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="125" y1="90" x2="165" y2="130" stroke="#555" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="165" y1="90" x2="125" y2="130" stroke="#555" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Frame -->
  <line x1="55" y1="110" x2="95" y2="100" stroke="#444" stroke-width="3" stroke-opacity="0.85"/>
  <line x1="95" y1="100" x2="85" y2="68" stroke="#444" stroke-width="3" stroke-opacity="0.85"/>
  <line x1="85" y1="68" x2="128" y2="72" stroke="#444" stroke-width="3" stroke-opacity="0.85"/>
  <line x1="95" y1="100" x2="128" y2="72" stroke="#444" stroke-width="3" stroke-opacity="0.85"/>
  <line x1="128" y1="72" x2="145" y2="110" stroke="#444" stroke-width="3" stroke-opacity="0.85"/>

  <!-- Seat post + saddle -->
  <line x1="85" y1="68" x2="85" y2="60" stroke="#444" stroke-width="2.5" stroke-opacity="0.85"/>
  <rect x="74" y="55" width="22" height="5" rx="2.5" fill="#555" fill-opacity="0.75"/>

  <!-- Stem + handlebars -->
  <line x1="128" y1="72" x2="130" y2="60" stroke="#444" stroke-width="2.5" stroke-opacity="0.85"/>
  <line x1="122" y1="57" x2="138" y2="57" stroke="#444" stroke-width="2.5" stroke-opacity="0.85"/>

  <!-- Wrench -->
  <g transform="translate(152,32) rotate(35)">
    <rect x="-3" y="0" width="6" height="22" rx="3" fill="#777" fill-opacity="0.7"/>
    <rect x="-7" y="-10" width="14" height="12" rx="2" fill="#777" fill-opacity="0.7"/>
    <rect x="-3" y="-10" width="6" height="7" rx="1" fill="white" fill-opacity="0.9"/>
  </g>

  <!-- Sparkles -->
  <circle cx="118" cy="45" r="2" fill="#aaa" fill-opacity="0.5"/>
  <circle cx="126" cy="38" r="1.5" fill="#aaa" fill-opacity="0.35"/>
  <circle cx="134" cy="44" r="1" fill="#aaa" fill-opacity="0.25"/>
</svg>
